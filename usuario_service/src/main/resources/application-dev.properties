#Puerto de microservicio usuario_service
server.port=8081

# Nombre de la aplicación
spring.application.name=usuario-service

# URL de conexion
spring.datasource.url=jdbc:mysql://localhost:3306/usuario_db?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true

# Usuario de MySQL
spring.datasource.username=dev_user

# Pass usuario de MySQL
spring.datasource.password=dev123

# Driver JDBC de MySql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate no crea ni modifica tablas, porque eso lo hará Flyway
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en consola
spring.jpa.show-sql=true

# Da formato legible al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Activa Flyway al iniciar la aplicación
spring.flyway.enabled=true

# Permite iniciar Flyway aunque ya existan tablas
spring.flyway.baseline-on-migrate=true

# Ruta donde estarán los scripts SQL de migración
spring.flyway.locations=classpath:db/migration

# Permite ejecutar flyway clean si lo haces manualmente
spring.flyway.clean-disabled=false

# Clave secreta para firmar el JWT // Mantener en todos los MicroServicios la misma
jwt.secret=clave_estacionamientos

# Tiempo de duración del token en milisegundos, 3600000 = 1 hora
jwt.expiration=3600000

# Documentación en Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Configuración Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.status-page-url-path=/doc/swagger-ui.html

management.endpoints.web.exposure.include=health,info