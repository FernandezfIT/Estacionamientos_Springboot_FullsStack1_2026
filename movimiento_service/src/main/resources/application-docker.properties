server.port=8086
spring.application.name=movimiento-service
spring.datasource.url=jdbc:mysql://mysql-local:3306/movimiento_db?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_DEV_USER:dev_user}
spring.datasource.password=${MYSQL_DEV_PASSWORD:dev123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
jwt.secret=${JWT_SECRET:clave_estacionamientos}
jwt.expiration=${JWT_EXPIRATION:3600000}
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.status-page-url-path=/doc/swagger-ui.html
eureka.instance.instance-id=localhost:${spring.application.name}:${server.port}
management.endpoints.web.exposure.include=health,info
