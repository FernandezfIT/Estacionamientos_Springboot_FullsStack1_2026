server:
  port: 8090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**

            - id: usuario-service
              uri: lb://usuario-service
              predicates:
                - Path=/api/v1/usuarios/**,/api/v1/roles/**,/api/v1/public/**

            - id: vehiculo-service
              uri: lb://vehiculo-service
              predicates:
                - Path=/api/v1/vehiculos/**,/api/v1/tipos-vehiculo/**

            - id: acceso-service
              uri: lb://acceso-service
              predicates:
                - Path=/api/v1/accesos/**

            - id: movimiento-service
              uri: lb://movimiento-service
              predicates:
                - Path=/api/v1/movimientos/**
            
            - id: plaza-service
              uri: lb://plaza-service
              predicates:
                - Path=/api/v1/plazas/**

            - id: reserva-service
              uri: lb://reserva-service
              predicates:
                - Path=/api/v1/reservas/**

            - id: liberacion-service
              uri: lb://liberacion-service
              predicates:
                - Path=/api/v1/liberaciones/**

            - id: reporte-service
              uri: lb://reporte-service
              predicates:
                - Path=/api/v1/reportes/**
                
            - id: cierre-service
              uri: lb://cierre-service
              predicates:
                - Path=/api/v1/cierres/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    status-page-url-path: /doc/swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway