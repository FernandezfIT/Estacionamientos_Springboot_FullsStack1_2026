server:
  port: 8090

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**

            - id: usuario-service
              uri: lb://USUARIO-SERVICE
              predicates:
                - Path=/api/v1/usuarios/**,/api/v1/roles/**,/api/v1/public/**

            - id: vehiculo-service
              uri: lb://VEHICULO-SERVICE
              predicates:
                - Path=/api/v1/vehiculos/**,/api/v1/tipos-vehiculo/**

            - id: acceso-service
              uri: lb://ACCESO-SERVICE
              predicates:
                - Path=/api/v1/accesos/**

            - id: movimiento-service
              uri: lb://MOVIMIENTO-SERVICE
              predicates:
                - Path=/api/v1/movimientos/**
            
            - id: plaza-service
              uri: lb://PLAZA-SERVICE
              predicates:
                - Path=/api/v1/plazas/**

            - id: reserva-service
              uri: lb://RESERVA-SERVICE
              predicates:
                - Path=/api/v1/reservas/**

            - id: liberacion-service
              uri: lb://LIBERACION-SERVICE
              predicates:
                - Path=/api/v1/liberaciones/**

            - id: reporte-service
              uri: lb://REPORTE-SERVICE
              predicates:
                - Path=/api/v1/reportes/**
                
            - id: cierre-service
              uri: lb://CIERRE-SERVICE
              predicates:
                - Path=/api/v1/cierres/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway