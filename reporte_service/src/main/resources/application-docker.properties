server.port=8089
spring.application.name=reporte-service
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
app.services.plaza.base-url=http://localhost:8083/api/v1/plazas
app.services.movimiento.base-url=http://localhost:8086/api/v1/movimientos
app.services.connect-timeout-ms=3000
app.services.read-timeout-ms=5000
jwt.secret=${JWT_SECRET:clave_estacionamientos}
jwt.expiration=${JWT_EXPIRATION:3600000}
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.status-page-url-path=/doc/swagger-ui.html
eureka.instance.instance-id=localhost:${spring.application.name}:${server.port}
management.endpoints.web.exposure.include=health,info
