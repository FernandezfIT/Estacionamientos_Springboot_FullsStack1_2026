spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=false

app.services.plaza.base-url=http://localhost:8083/api/v1/plazas
app.services.plaza.connect-timeout-ms=1000
app.services.plaza.read-timeout-ms=1000
app.services.movimiento.base-url=http://localhost:8086/api/v1/movimientos
app.services.connect-timeout-ms=1000
app.services.read-timeout-ms=1000

jwt.secret=clave-secreta-de-prueba-con-longitud-suficiente

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

eureka.client.enabled=false
