server.port=8080
spring.application.name=auth-service
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
app.services.usuario.base-url=http://localhost:8081/api/v1/usuarios
app.services.usuario.connect-timeout-ms=3000
app.services.usuario.read-timeout-ms=5000
jwt.secret=${JWT_SECRET:clave_estacionamientos}
jwt.expiration=${JWT_EXPIRATION:3600000}
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.status-page-url-path=/doc/swagger-ui.html
eureka.instance.instance-id=localhost:${spring.application.name}:${server.port}
management.endpoints.web.exposure.include=health,info
